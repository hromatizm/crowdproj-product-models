services:
  kafka:
    image: apache/kafka:3.9.2
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  cassandra:
    image: cassandra:5.0.7
    container_name: cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: "local-cluster"
    healthcheck:
      # Cassandra стартует долго — нужен большой start_period
      test: [ "CMD-SHELL", "cqlsh -e 'describe keyspaces' || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  liquibase:
    image: liquibase/liquibase:4.29
    container_name: liquibase
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./liquibase/lib:/liquibase/lib          # ← JAR-файлы расширений
      - ./liquibase/changelog:/liquibase/changelog
    command: >
      --url="jdbc:cassandra://cassandra:9042?localdatacenter=datacenter1&DefaultKeyspace=myapp_keyspace"
      --username=cassandra
      --password=cassandra
      --changeLogFile=changelog/master.yaml
      --driver=com.ing.data.cassandra.jdbc.CassandraDriver
      update

  app-kafka:
    build:
      context: ../
      dockerfile: docker/Dockerfile-app-kafka
    container_name: app-kafka
    depends_on:
      - kafka
      - liquibase
    environment:
      KAFKA_HOSTS: kafka:29092
      KAFKA_GROUP_ID: pm-group
      KAFKA_TOPIC_IN_V1: pm-v1-in
      KAFKA_TOPIC_OUT_V1: pm-v1-out

volumes:
  kafka_data:
